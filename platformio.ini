[env:smalltv-ultra]
platform = espressif8266
; SmallTV Ultra ships with a 4 MB flash chip (W25Q32). esp01_1m only used 1 MB,
; which left no room for the OTA second-copy region — switching to the 4 MB
; layout (4m1m: ~1 MB sketch + ~1 MB OTA gap) so browser OTA updates fit.
board = esp12e
board_build.ldscript = eagle.flash.4m1m.ld
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
upload_port = /dev/ttyUSB0
upload_speed = 115200

lib_deps =
    bodmer/TFT_eSPI@^2.5.0
    bblanchon/ArduinoJson@^7.0.0
    rweather/Crypto@^0.4.0

build_flags =
    ; TFT_eSPI display config — ST7789 240x240 (GeekMagic SmallTV Ultra)
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    -D TFT_INVERSION_ON
    -D TFT_RGB_ORDER=TFT_BGR
    -D TFT_CS=-1
    -D TFT_DC=0
    -D TFT_RST=2
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_BL=5
    -D TFT_BACKLIGHT_ON=LOW
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_GFXFF=1
    -D BOARD_SMALLTV_ULTRA=1
    -D CORE_DEBUG_LEVEL=1

[env:cyd]
; ESP32 "Cheap Yellow Display" — ESP32-2432S028Rv3 (USB-C + micro-USB, ST7789).
; Pinned to espressif32 6.x (Arduino core 2.0.x) for stable TFT_eSPI + ledc APIs.
; Default ESP32 partition table keeps two OTA app slots so browser OTA works.
platform = espressif32@^6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    bodmer/TFT_eSPI@^2.5.0
    bblanchon/ArduinoJson@^7.0.0
    rweather/Crypto@^0.4.0

build_flags =
    ; TFT_eSPI display config — ST7789 240x320 (CYD 2432S028Rv3)
    ; If the screen is blank/garbled, the board may be the ILI9341 variant:
    ;   swap ST7789_DRIVER -> ILI9341_2_DRIVER.
    ; If colors look inverted (white bg), toggle TFT_INVERSION_OFF <-> TFT_INVERSION_ON.
    ; If red/blue are swapped, change TFT_RGB_ORDER TFT_BGR <-> TFT_RGB.
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_INVERSION_OFF
    -D TFT_RGB_ORDER=TFT_BGR
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH
    -D SPI_FREQUENCY=55000000
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_GFXFF=1
    -D BOARD_CYD=1
    -D CORE_DEBUG_LEVEL=1
