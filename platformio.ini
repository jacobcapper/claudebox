[env:smalltv-ultra]
platform = espressif8266
; SmallTV Ultra ships with a 4 MB flash chip (W25Q32). esp01_1m only used 1 MB,
; which left no room for the OTA second-copy region — switching to the 4 MB
; layout (4m1m: ~1 MB sketch + ~1 MB OTA gap) so browser OTA updates fit.
board = esp12e
board_build.ldscript = eagle.flash.4m1m.ld
; esp12e defaults to dio, but this board's flash was verified working in qio
; under the old esp01_1m build — keep qio so we only change flash SIZE, not mode.
board_build.flash_mode = qio
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
upload_port = /dev/ttyUSB0
upload_speed = 115200

lib_deps =
    bodmer/TFT_eSPI@^2.5.0
    bblanchon/ArduinoJson@^7.0.0
    rweather/Crypto@^0.4.0

build_flags =
    ; TFT_eSPI display config — ST7789 240x240 (GeekMagic SmallTV Ultra)
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    -D TFT_INVERSION_ON
    -D TFT_RGB_ORDER=TFT_BGR
    -D TFT_CS=-1
    -D TFT_DC=0
    -D TFT_RST=2
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_BL=5
    -D TFT_BACKLIGHT_ON=LOW
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_GFXFF=1
    -D BOARD_SMALLTV_ULTRA=1
    -D CORE_DEBUG_LEVEL=1
